<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Causal Intelligence Dashboard</title>
<meta name="description" content="Nexus CTG Dashboard - Visualize causal chains, decay alerts, and risk scores">
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--surface:#12122a;--card:#1a1a3e;--border:#2a2a5e;--text:#e0e0ff;--muted:#8888bb;--accent:#6c63ff;--accent2:#00d4aa;--danger:#ff4466;--warn:#ffaa33;--safe:#00dd88;--glow:rgba(108,99,255,0.15)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(135deg,#0d0d2b,#1a1a4e);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .meta{font-size:12px;color:var(--muted)}
.nav{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:4px;border:1px solid var(--border)}
.nav button{padding:8px 16px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:8px;font-size:13px;font-family:inherit;transition:all .2s}
.nav button.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(108,99,255,.4)}
.nav button:hover:not(.active){background:var(--card);color:var(--text)}
.container{padding:24px 32px;max-width:1400px;margin:0 auto}
.grid{display:grid;gap:20px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--glow)}
.card h3{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.stat{font-size:36px;font-weight:700}
.stat.danger{color:var(--danger)}
.stat.warn{color:var(--warn)}
.stat.safe{color:var(--safe)}
.stat.accent{color:var(--accent)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.critical{background:rgba(255,68,102,.15);color:var(--danger);border:1px solid rgba(255,68,102,.3)}
.badge.high{background:rgba(255,170,51,.15);color:var(--warn);border:1px solid rgba(255,170,51,.3)}
.badge.medium{background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3)}
.badge.low{background:rgba(0,221,136,.15);color:var(--safe);border:1px solid rgba(0,221,136,.3)}
.badge.p0{background:rgba(255,68,102,.2);color:var(--danger)}
.badge.p1{background:rgba(255,170,51,.2);color:var(--warn)}
.badge.p2{background:rgba(0,212,170,.2);color:var(--accent2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;border-bottom:1px solid rgba(42,42,94,.5)}
tr:hover td{background:rgba(108,99,255,.05)}
.risk-bar{height:6px;border-radius:3px;background:var(--surface);overflow:hidden;min-width:80px}
.risk-bar .fill{height:100%;border-radius:3px;transition:width .5s}
.section{display:none}
.section.active{display:block}
#ctg-graph{height:500px;border-radius:14px;border:1px solid var(--border);background:var(--surface)}
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;border-left:3px solid var(--danger)}
.alert-card.monitoring{border-left-color:var(--warn)}
.alert-card h4{font-size:14px;margin-bottom:6px}
.alert-card p{font-size:12px;color:var(--muted);line-height:1.5}
.cf-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.cf-card .question{font-size:15px;font-weight:500;margin-bottom:8px}
.cf-card .detail{font-size:12px;color:var(--muted);line-height:1.5}
.loading{text-align:center;padding:80px;color:var(--muted)}
.heatmap{display:grid;gap:3px}
.heatmap-cell{padding:10px;border-radius:6px;text-align:center;font-size:11px;font-weight:500;transition:transform .15s}
.heatmap-cell:hover{transform:scale(1.05)}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.header{flex-direction:column;gap:12px}}
</style>
</head>
<body>
<div class="header">
  <div><h1>⬡ NEXUS</h1><div class="meta" id="header-meta">Causal Intelligence Platform</div></div>
  <div class="nav" id="nav">
    <button class="active" data-tab="overview">Overview</button>
    <button data-tab="ctg">CTG Explorer</button>
    <button data-tab="risks">Risk Heatmap</button>
    <button data-tab="decay">Decay Alerts</button>
    <button data-tab="counterfactual">Counterfactual</button>
    <button data-tab="knowledge">Knowledge</button>
    <button data-tab="backlog">Remediation</button>
  </div>
</div>
<div class="container" id="app"><div class="loading">Loading nexus_data.json...</div></div>

<script>
let DATA = null;
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// Load data — tries API first, then static files
async function loadData() {
  const paths = ['/api/data','../postgres-analysis/output/nexus_data.json','nexus_data.json','./postgres-analysis/output/nexus_data.json'];
  for (const p of paths) {
    try { const r = await fetch(p); if(r.ok){DATA=await r.json();return true;} } catch(e){}
  }
  $('#app').innerHTML = '<div class="loading">Could not load data. Start the API server: <code>py api_server.py</code></div>';
  return false;
}

function riskColor(v) { return v>=70?'var(--danger)':v>=50?'var(--warn)':v>=30?'var(--accent)':'var(--safe)'; }
function riskClass(v) { return v>=70?'critical':v>=50?'high':v>=30?'medium':'low'; }
function blastClass(b) { return b||'low'; }

function init() {
  const m = DATA.metadata||{};
  $('#header-meta').textContent = `${m.repository||''} • ${m.total_dprs||0} DPRs • ${m.total_edges||0} edges`;
  renderApp();
  setupNav();
}

function setupNav() {
  $$('.nav button').forEach(btn => {
    btn.onclick = () => {
      $$('.nav button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      $$('.section').forEach(s=>s.classList.remove('active'));
      const sec = $(`#tab-${btn.dataset.tab}`);
      if(sec) sec.classList.add('active');
      if(btn.dataset.tab==='ctg') setTimeout(renderCTG,100);
    };
  });
}

function renderApp() {
  const dprs=DATA.dprs||[], risks=DATA.risk_scores||[], alerts=DATA.assumptions||[], backlog=DATA.remediation_backlog||[];
  const cf=DATA.counterfactual_traces||[], kc=DATA.knowledge_concentration||{};
  const crit=risks.filter(r=>r.composite_risk>=70).length;
  const decaying=alerts.filter(a=>a.already_decaying).length;
  const p0=backlog.filter(b=>b.priority==='P0').length;

  $('#app').innerHTML = `
  <div id="tab-overview" class="section active">
    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="card"><h3>Total DPRs</h3><div class="stat accent">${dprs.length}</div></div>
      <div class="card"><h3>Critical Risk</h3><div class="stat danger">${crit}</div></div>
      <div class="card"><h3>Decaying Assumptions</h3><div class="stat warn">${decaying}</div></div>
      <div class="card"><h3>P0 Remediation</h3><div class="stat danger">${p0}</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card"><h3>Top Risk Scores</h3>
        <table><tr><th>DPR</th><th>Title</th><th>Risk</th><th></th></tr>
        ${risks.slice(0,8).map(r=>`<tr><td>${r.dpr_id}</td><td>${r.title}</td><td><span class="badge ${riskClass(r.composite_risk)}">${r.composite_risk.toFixed(0)}</span></td>
        <td><div class="risk-bar"><div class="fill" style="width:${r.composite_risk}%;background:${riskColor(r.composite_risk)}"></div></div></td></tr>`).join('')}
        </table>
      </div>
      <div class="card"><h3>Active Decay Alerts</h3>
        ${alerts.filter(a=>a.already_decaying).map(a=>`
          <div class="alert-card"><h4>${a.dpr_id}: ${a.assumption.substring(0,60)}...</h4><p>${a.decay_evidence.substring(0,120)}...</p></div>
        `).join('')}
        ${alerts.filter(a=>!a.already_decaying).map(a=>`
          <div class="alert-card monitoring"><h4>${a.dpr_id}: ${a.assumption.substring(0,60)}...</h4><p>Monitoring — ${a.earliest_signal_date}</p></div>
        `).join('')}
      </div>
    </div>
  </div>

  <div id="tab-ctg" class="section">
    <div class="card" style="margin-bottom:20px"><h3>Causal Temporal Graph</h3><div id="ctg-graph"></div></div>
    <div class="card"><h3>CTG Edges</h3>
      <table><tr><th>From</th><th>Relationship</th><th>To</th><th>Explanation</th></tr>
      ${(DATA.ctg_edges||[]).map(e=>`<tr><td>${e.from_dpr}</td><td><span class="badge medium">${e.relationship}</span></td><td>${e.to_dpr}</td><td style="font-size:11px;color:var(--muted)">${e.explanation}</td></tr>`).join('')}
      </table>
    </div>
  </div>

  <div id="tab-risks" class="section">
    <div class="card" style="margin-bottom:20px"><h3>Risk Heatmap — Component × Risk Dimension</h3><div id="heatmap"></div></div>
    <div class="card"><h3>All Risk Scores</h3>
      <table><tr><th>DPR</th><th>Title</th><th>Component</th><th>Composite</th><th>Blast</th><th>Decay</th><th>Connect</th><th>Workaround</th><th>Active Decay</th></tr>
      ${risks.map(r=>`<tr><td>${r.dpr_id}</td><td>${r.title}</td><td>${r.component}</td>
        <td><span class="badge ${riskClass(r.composite_risk)}">${r.composite_risk.toFixed(0)}</span></td>
        <td>${r.blast_radius_score}</td><td>${r.decay_risk_score}</td><td>${r.connectivity_score}</td><td>${r.workaround_pressure}</td>
        <td>${r.active_decay?'<span class="badge critical">YES</span>':'—'}</td></tr>`).join('')}
      </table>
    </div>
  </div>

  <div id="tab-decay" class="section">
    <div class="card"><h3>Assumption Decay Alerts</h3>
      ${alerts.map(a=>`
        <div class="alert-card ${a.already_decaying?'':'monitoring'}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <h4>${a.dpr_id}: ${a.assumption}</h4>
            <span class="badge ${a.already_decaying?'critical':'high'}">${a.already_decaying?'DECAYING':'MONITORING'}</span>
          </div>
          <p style="margin-top:8px"><strong>Evidence:</strong> ${a.decay_evidence}</p>
          <p><strong>Earliest Signal:</strong> ${a.earliest_signal_date}</p>
          <p><strong>Signals:</strong> ${(a.decay_signals_found||[]).join('; ')}</p>
          <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent);font-size:12px">Monitor Query</summary><pre style="font-size:11px;margin-top:6px;padding:8px;background:var(--bg);border-radius:6px;overflow-x:auto;color:var(--accent2)">${a.recommended_monitor_query||'N/A'}</pre></details>
        </div>
      `).join('')}
    </div>
  </div>

  <div id="tab-counterfactual" class="section">
    <div class="card"><h3>Counterfactual Simulations</h3>
      ${cf.map(t=>{
        const rl=t.risk||{};
        const rc={extreme:'critical',high:'high',medium:'medium',low:'low'}[rl.level]||'medium';
        return `<div class="cf-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="question">${t.question||t.scenario_id}</div>
            <span class="badge ${rc}">${(rl.level||'?').toUpperCase()}</span>
          </div>
          <div class="detail">
            <p><strong>Target:</strong> ${t.target_dpr} — ${t.target_title||''}</p>
            <p><strong>Alternative:</strong> ${t.alternative||''}</p>
            <p><strong>Affected:</strong> ${t.affected_count||0} DPRs across ${(t.affected_components||[]).join(', ')}</p>
            <p style="margin-top:6px">${t.reasoning||''}</p>
          </div>
          ${(t.impacts||[]).length?`<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent);font-size:12px">Impact Details (${t.impacts.length})</summary>
            <table style="margin-top:8px"><tr><th>DPR</th><th>Title</th><th>Rel</th><th>Depth</th></tr>
            ${t.impacts.map(i=>`<tr><td>${i.dpr_id}</td><td>${i.title}</td><td><span class="badge medium">${i.relationship}</span></td><td>${i.distance}</td></tr>`).join('')}
            </table></details>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>

  <div id="tab-knowledge" class="section">
    <div class="grid grid-2" style="margin-bottom:20px">
      <div class="card"><h3>Author Summary</h3>
        <table><tr><th>Author</th><th>DPRs</th><th>Components</th><th>SPOF?</th></tr>
        ${(kc.author_summary||[]).sort((a,b)=>b.total_dprs-a.total_dprs).map(a=>`<tr><td>${a.author}</td><td>${a.total_dprs}</td><td>${(a.components||[]).join(', ')}</td>
          <td>${a.is_spof?'<span class="badge critical">SPOF</span>':'—'}</td></tr>`).join('')}
        </table>
      </div>
      <div class="card"><h3>Component Concentration</h3>
        <table><tr><th>Component</th><th>Top Author</th><th>%</th><th>Risk</th></tr>
        ${Object.entries(kc.component_concentration||{}).map(([comp,info])=>{
          const top=(info.authors||[])[0]||{};
          return `<tr><td>${comp}</td><td>${top.author||'—'}</td><td>${top.percentage||0}%</td>
            <td><span class="badge ${info.concentration_risk||'low'}">${info.concentration_risk||'low'}</span></td></tr>`;
        }).join('')}
        </table>
      </div>
    </div>
    <div class="card"><h3>SPOF Alerts</h3>
      ${(kc.spof_alerts||[]).map(a=>`
        <div class="alert-card"><h4>${a.author} → ${a.dpr_id}: ${a.dpr_title}</h4>
        <p>${a.recommendation}</p>
        <div style="margin-top:6px"><span class="badge ${blastClass(a.blast_radius)}">${a.blast_radius} blast</span> <span class="badge critical">${a.ownership_pct}% ownership</span></div></div>
      `).join('')}
    </div>
  </div>

  <div id="tab-backlog" class="section">
    <div class="card"><h3>Prioritized Remediation Backlog</h3>
      <table><tr><th>Priority</th><th>DPR</th><th>Title</th><th>Risk</th><th>Actions</th><th>Effort</th></tr>
      ${backlog.map(b=>`<tr>
        <td><span class="badge ${b.priority.toLowerCase()}">${b.priority}</span></td>
        <td>${b.dpr_id}</td><td>${b.title}</td>
        <td><span class="badge ${riskClass(b.risk_score)}">${b.risk_score.toFixed(0)}</span></td>
        <td style="font-size:11px">${(b.actions||[]).map(a=>'• '+a).join('<br>')}</td>
        <td><span class="badge ${b.estimated_effort==='high'?'critical':b.estimated_effort==='medium'?'high':'low'}">${b.estimated_effort}</span></td>
      </tr>`).join('')}
      </table>
    </div>
  </div>`;

  renderHeatmap();
}

function renderCTG() {
  const container = $('#ctg-graph');
  if(!container||container.dataset.rendered) return;
  container.dataset.rendered='1';

  const dprs=DATA.dprs||[], edges=DATA.ctg_edges||[];
  const colorMap={Storage:'#6c63ff',MVCC:'#ff4466',WAL:'#00d4aa',Autovacuum:'#ffaa33',ProcessModel:'#ff88cc',Replication:'#44aaff'};
  const brSize={critical:35,high:28,medium:22,low:18};

  const nodes = new vis.DataSet(dprs.map(d=>({
    id:d.dpr_id,label:`${d.dpr_id}\n${d.title.substring(0,20)}`,
    color:{background:colorMap[d.component]||'#666',border:'rgba(255,255,255,0.2)',highlight:{background:colorMap[d.component]||'#666',border:'#fff'}},
    font:{color:'#fff',size:10,face:'Inter'},
    size:brSize[d.blast_radius_estimate]||22,
    title:`${d.dpr_id}: ${d.title}\nComponent: ${d.component}\nBlast: ${d.blast_radius_estimate}\nDecay Risk: ${d.assumption_decay_risk}`,
    shape:'dot',
  })));

  const relColors={constrains:'#ff4466',enables:'#00d4aa',requires:'#ffaa33',required_by:'#6c63ff',temporal_precedes:'#8888bb',assumption_of:'#ff88cc'};
  const edgeData = new vis.DataSet(edges.map((e,i)=>({
    id:i,from:e.from_dpr,to:e.to_dpr,
    label:e.relationship,font:{size:8,color:'#8888bb',strokeWidth:0},
    arrows:'to',color:{color:relColors[e.relationship]||'#555',opacity:0.7},
    smooth:{type:'curvedCW',roundness:0.2},
    title:e.explanation,
  })));

  new vis.Network(container,{nodes,edges:edgeData},{
    physics:{solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-120,springLength:160}},
    interaction:{hover:true,tooltipDelay:100},
    layout:{improvedLayout:true},
  });
}

function renderHeatmap() {
  const el=$('#heatmap');
  if(!el)return;
  const risks=DATA.risk_scores||[];
  const comps=[...new Set(risks.map(r=>r.component))].sort();
  const dims=['composite_risk','blast_radius_score','decay_risk_score','connectivity_score','workaround_pressure'];
  const labels=['Composite','Blast','Decay','Connectivity','Workarounds'];

  let html='<div class="heatmap" style="grid-template-columns:120px repeat('+dims.length+',1fr)">';
  html+='<div></div>'+labels.map(l=>`<div style="text-align:center;font-size:11px;color:var(--muted);padding:6px">${l}</div>`).join('');

  for(const comp of comps){
    html+=`<div style="font-size:12px;font-weight:500;padding:8px;display:flex;align-items:center">${comp}</div>`;
    const compRisks=risks.filter(r=>r.component===comp);
    for(const dim of dims){
      const avg=compRisks.reduce((s,r)=>s+(r[dim]||0),0)/Math.max(compRisks.length,1);
      const c=riskColor(avg);
      const opacity=Math.max(0.2,avg/100);
      html+=`<div class="heatmap-cell" style="background:${c};opacity:${opacity};color:#fff" title="${comp}: ${dim} = ${avg.toFixed(1)}">${avg.toFixed(0)}</div>`;
    }
  }
  html+='</div>';
  el.innerHTML=html;
}

loadData().then(ok=>{if(ok)init();});
</script>
</body>
</html>
